version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: 'cron'
      cronjob: '0 8 * * MON#1'
      timezone: 'Europe/Oslo'
    groups:
      frontend:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: 'cron'
      cronjob: '0 8 * * MON#1'
      timezone: 'Europe/Oslo'
